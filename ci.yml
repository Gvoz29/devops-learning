name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Postavi Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instaliraj zavisnosti
        run: pip install -r requirements.txt

      - name: Pokreni testove
        run: pytest test_app.py -v
